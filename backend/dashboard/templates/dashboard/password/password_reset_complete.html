{% extends "dashboard/base_auth.html" %}
{% load static %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card shadow-sm">
        <div class="text-center">
            <img src="{% static 'dashboard/images/Downtown_Shoppers_logo.png' %}" 
                 alt="Downtown Shoppers" 
                 class="login-logo">
            <h1 class="login-title">Password Reset Complete</h1>
            <p class="welcome-text">
                Your password has been set. You may go ahead and log in now.
            </p>
            
            <a href="{% url 'dashboard:login' %}" class="btn btn-primary btn-login">
                Log In
            </a>
        </div>
    </div>
</div>
{% endblock %}
