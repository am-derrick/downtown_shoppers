name: AI Code Checker

on:
  pull_request:
    branches: [main, prod]
  push:
    branches: [main, prod]

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AI Code Checker
        run: |
          python backend/ai_code_checker/run_checker.py
